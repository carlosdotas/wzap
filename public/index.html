<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Bot Control</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>
    <div class="container">
        <header>
            <h1>WhatsApp <span>Control</span></h1>
            <div id="status-badge" class="status-badge">Carregando...</div>
        </header>

        <main>
            <section id="auth-section" class="card">
                <h2>Conexão</h2>
                <div id="qr-container" class="qr-container">
                    <p id="qr-placeholder">Aguardando geração do QR Code...</p>
                    <canvas id="qr-canvas"></canvas>
                </div>
                <div class="actions">
                    <button id="reset-btn" class="secondary">Reiniciar Conexão</button>
                </div>
                <p class="hint">Escaneie o código com seu WhatsApp para conectar.</p>
            </section>

            <section id="control-section" class="card hidden">
                <div class="tabs tabs-with-actions">
                    <div class="tabs-left">
                        <button class="tab-btn active" data-tab="single">Individual</button>
                        <button class="tab-btn" data-tab="bulk">Em Massa (Seguro)</button>
                        <button class="tab-btn" data-tab="schedule">Agendar</button>
                            <button class="tab-btn" data-tab="status">Status</button>
                    </div>
                    <div class="tabs-right">
                        <button id="clear-session-btn" class="danger mini">🗑️ Limpar Sessão</button>
                        <a href="/logout" class="btn-logout">Sair</a>
                    </div>
                </div>

                <div class="control-layout">
                    <div class="main-form">
                        <!-- Envio Individual -->
                        <div id="single-tab" class="tab-content">
                            <div class="input-group">
                                <label for="phone">Número (com 55 e DDD)</label>
                                <input type="text" id="phone" placeholder="Ex: 5511999999999">
                            </div>
                            <div class="input-group">
                                <label for="message">Mensagem</label>
                                <textarea id="message" rows="3" placeholder="Digite sua mensagem..."></textarea>
                            </div>
                            <button id="send-btn">Enviar Agora</button>
                        </div>

                        <!-- Agendamento -->
                        <div id="schedule-tab" class="tab-content hidden">
                            <div class="input-group">
                                <label for="schedule-phone">Número (com 55 e DDD)</label>
                                <input type="text" id="schedule-phone" placeholder="Ex: 5511999999999">
                            </div>
                            <div class="input-group">
                                <label for="schedule-datetime">Data e Hora de Envio</label>
                                <input type="datetime-local" id="schedule-datetime">
                            </div>
                            <div class="input-group">
                                <label for="schedule-message">Mensagem</label>
                                <textarea id="schedule-message" rows="3"
                                    placeholder="Mensagem para o futuro..."></textarea>
                            </div>
                            <button id="schedule-btn">Confirmar Agendamento</button>

                            <div class="history-list card-inner">
                                <h3>Próximos Envios</h3>
                                <div id="scheduled-list" class="mini-list"></div>
                            </div>
                        </div>

                        <!-- Envio em Massa -->
                        <div id="bulk-tab" class="tab-content hidden">
                            <div class="input-group">
                                <label for="bulk-numbers">Números (um por linha)</label>
                                <textarea id="bulk-numbers" rows="5"
                                    placeholder="5511999999999&#10;5511888888888"></textarea>
                                <button id="import-clientes-btn" class="secondary mini">Importar Todos Clientes</button>
                            </div>
                            <div class="input-group">
                                <label for="bulk-message">Mensagem para todos</label>
                                <textarea id="bulk-message" rows="3" placeholder="Mensagem padrão..."></textarea>
                            </div>
                            <div class="input-group">
                                <label for="bulk-delay">Atraso entre envios (segundos)</label>
                                <input type="number" id="bulk-delay" value="10" min="5">
                            </div>
                            <button id="send-bulk-btn">Agendar Fila de Envio</button>
                            <div id="queue-info" class="queue-info hidden">
                                Fila: <span id="queue-count">0</span> mensagens restantes.
                            </div>
                        </div>


                        <!-- Postar Status -->
                        <div id="status-tab" class="tab-content hidden">
                            <div class="tabs mini-tabs">
                                <button class="tab-btn active" data-subtab="media">Mídia (Foto/Vídeo)</button>
                                <button class="tab-btn" data-subtab="text">Texto Colorido</button>
                            </div>

                            <!-- Subtab Mídia -->
                            <div id="subtab-media" class="subtab-content">
                                <div class="input-group">
                                    <label for="status-file">Imagem ou Vídeo (Opcional)</label>
                                    <input type="file" id="status-file" accept="image/*,video/*">
                                </div>
                            </div>

                            <!-- Subtab Texto Customizado -->
                            <div id="subtab-text" class="subtab-content hidden">
                                <div class="input-row">
                                    <div class="input-group">
                                        <label>Fundo</label>
                                        <input type="color" id="status-bg-color" value="#10b981">
                                    </div>
                                    <div class="input-group">
                                        <label>Texto</label>
                                        <input type="color" id="status-text-color" value="#ffffff">
                                    </div>
                                    <div class="input-group">
                                        <label>Fonte</label>
                                        <select id="status-font">
                                            <option value="Outfit">Outfit</option>
                                            <option value="Arial">Arial</option>
                                            <option value="Courier New">Terminal</option>
                                            <option value="Georgia">Serrif</option>
                                            <option value="cursive">Manuscrita</option>
                                        </select>
                                    </div>
                                </div>
                            </div>

                            <div id="status-preview" class="media-preview hidden"></div>

                            <div class="input-group">
                                <label for="status-message">Mensagem ou Status</label>
                                <textarea id="status-message" rows="3" placeholder="Digite aqui..."></textarea>
                            </div>
                            <button id="send-status-btn">Postar no Status</button>
                            <canvas id="status-canvas" width="1080" height="1920" style="display:none;"></canvas>

                        </div>
                    </div>

                    <div class="side-panel">
                        <div class="search-box">
                            <input type="text" id="search-clientes" placeholder="Buscar cliente...">
                        </div>
                        <div id="clientes-sidebar-list" class="mini-list">
                            <!-- Lista de clientes será injetada aqui -->
                        </div>
                    </div>
                </div>
            </section>

            <section class="card">
                <h2>Logs de Atividade</h2>
                <div id="logs" class="logs-container">
                    <div class="log-entry system">Sistema iniciado...</div>
                </div>
            </section>
        </main>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.4.4/build/qrcode.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
