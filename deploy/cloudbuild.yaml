# Cloud Build - CI/CD automático para o WZAP
# Ativado com: gcloud builds triggers create github --repo-name=wzap ...
# Ou manualmente: gcloud builds submit --config=deploy/cloudbuild.yaml .

substitutions:
  _APP_NAME: wzap
  _REGION: southamerica-east1
  _SERVICE_ACCOUNT: "" # deixe vazio para usar o padrão

steps:
  # 1. Build da imagem Docker
  - name: "gcr.io/cloud-builders/docker"
    id: "build"
    args:
      - build
      - "--platform=linux/amd64"
      - "--tag=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_APP_NAME}/${_APP_NAME}:$SHORT_SHA"
      - "--tag=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_APP_NAME}/${_APP_NAME}:latest"
      - "--cache-from=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_APP_NAME}/${_APP_NAME}:latest"
      - "."

  # 2. Push para o Artifact Registry
  - name: "gcr.io/cloud-builders/docker"
    id: "push-sha"
    waitFor: ["build"]
    args:
      - push
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_APP_NAME}/${_APP_NAME}:$SHORT_SHA"

  - name: "gcr.io/cloud-builders/docker"
    id: "push-latest"
    waitFor: ["build"]
    args:
      - push
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_APP_NAME}/${_APP_NAME}:latest"

  # 3. Deploy no Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: "deploy"
    waitFor: ["push-sha", "push-latest"]
    entrypoint: gcloud
    args:
      - run
      - deploy
      - "${_APP_NAME}"
      - "--image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_APP_NAME}/${_APP_NAME}:$SHORT_SHA"
      - "--region=${_REGION}"
      - "--platform=managed"
      - "--quiet"

images:
  - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_APP_NAME}/${_APP_NAME}:$SHORT_SHA"
  - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_APP_NAME}/${_APP_NAME}:latest"

options:
  machineType: "E2_HIGHCPU_8"
  logging: CLOUD_LOGGING_ONLY
  dynamicSubstitutions: true

timeout: "1200s" # 20 minutos (Chrome demora para instalar)
